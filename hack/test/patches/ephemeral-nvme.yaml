apiVersion: v1alpha1
kind: VolumeConfig
name: EPHEMERAL
provisioning:
  diskSelector:
    match: disk.transport == 'nvme'
  minSize: 3GB
  maxSize: 5GB
mount:
  disableAccessTime: true
---
apiVersion: v1alpha1
kind: SwapVolumeConfig
name: swap1
provisioning:
  diskSelector:
    match: disk.transport == 'nvme'
  minSize: 500MB
  maxSize: 500MB
---
apiVersion: v1alpha1
kind: KubeletConfig
config:
  memorySwap:
    swapBehavior: LimitedSwap
---
apiVersion: v1alpha1
kind: ZswapConfig
maxPoolPercent: 25
shrinkerEnabled: true
