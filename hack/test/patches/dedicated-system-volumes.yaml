apiVersion: v1alpha1
kind: VolumeConfig
name: KUBELET
provisioning:
  diskSelector:
    match: disk.transport == 'nvme'
  minSize: 3GB
  maxSize: 5GB
mount:
  disableAccessTime: true
---
