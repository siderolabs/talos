---
machine:
  nodeLabels:
    openebs.io/engine: "mayastor"
  kubelet:
    extraMounts:
      - destination: /var/local
        type: bind
        source: /var/local
        options:
          - bind
          - rshared
          - rw
---
apiVersion: v1alpha1
kind: SysctlConfig
params:
  vm.nr_hugepages: "1024"
