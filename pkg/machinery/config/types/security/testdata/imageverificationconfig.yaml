apiVersion: v1alpha1
kind: ImageVerificationConfig
rules:
    - image: ghcr.io/*
      keyless:
        issuer: https://token.actions.githubusercontent.com
        subjectRegex: https://github.com/myorg/.*
    - image: my-registry/*
      publicKey:
        certificate: |-
            -----BEGIN CERTIFICATE-----
            MII--Sample Value--
            -----END CERTIFICATE-----
    - image: no-verifier/*
      skip: true
    - image: deny-all/*
      deny: true
