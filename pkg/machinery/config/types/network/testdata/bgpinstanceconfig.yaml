apiVersion: v1alpha1
kind: BGPInstanceConfig
name: fabric
localASN: 65001
routerID: 10.0.0.1
advertise:
    - dummy0
multipath: true
neighbors:
    - address: 10.5.0.1
      peerASN: 65000
      passive: true
      holdTime: 9s
    - link: enp0s1
      peerASN: 65000
      holdTime: 9s
      bfd:
        transmitInterval: 300ms
        receiveInterval: 300ms
        detectMultiplier: 3
