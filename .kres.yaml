            TF_E2E_TEST_TYPE: aws
            TF_E2E_ACTION: apply
        - name: e2e-aws-nvidia
          command: e2e-aws
          environment:
            EXTRA_TEST_ARGS: ${{ matrix.extraTestArgs }}
            INTEGRATION_TEST_RUN: TestIntegration/api.ExtensionsSuiteNVIDIA
        - name: tf destroy
          command: e2e-cloud-tf
          conditions:
            - always
          environment:
            TF_SCRIPT_DIR: _out/contrib
            TF_E2E_TEST_TYPE: aws
            TF_E2E_ACTION: destroy
            TF_E2E_REFRESH_ON_DESTROY: false
    - name: integration-gcp
      buildxOptions:
        enabled: true
      sops: true
      depends:
        - default
      runnerGroup: generic # we can use generic here since the tests run against a remote talos cluster
      onWorkflowRun:
        workflows: [artifacts-cron]
        types: [completed]
      triggerLabels:
        - integration/gcp
        - integration/release-gate
      steps:
        - name: download-artifacts
          artifactStep:
            type: download
            artifactName: talos-artifacts
            artifactPath: _out
        - name: ci-temp-release-tag
        - name: image-gcp
          environment:
            PLATFORM: linux/amd64,linux/arm64
            IMAGE_REGISTRY: registry.dev.siderolabs.io
        - name: e2e-gcp-prepare
        - name: checkout contrib
          checkoutStep:
            repository: siderolabs/contrib
            ref: main
            path: _out/contrib
        - name: setup tf
          terraformStep: true
        - name: tf apply
          command: e2e-cloud-tf
          environment:
            TF_SCRIPT_DIR: _out/contrib
            TF_E2E_TEST_TYPE: gcp
            TF_E2E_ACTION: apply
        - name: e2e-gcp
        - name: tf destroy
          command: e2e-cloud-tf
          conditions:
            - always
          environment:
            TF_SCRIPT_DIR: _out/contrib
            TF_E2E_TEST_TYPE: gcp
            TF_E2E_ACTION: destroy
            TF_E2E_REFRESH_ON_DESTROY: false
---
kind: common.Renovate
spec:
  customManagers:
    - customType: regex
      managerFilePatterns:
        - Makefile
      matchStrings:
        - '# renovate: datasource=(?<datasource>.*?)(?:\s+extractVersion=(?<extractVersion>.+?))?\s+depName=(?<depName>.+?)\s.*_VERSION\s+\?=\s+(?<currentValue>.+)'
      versioningTemplate: "{{#if versioning}}{{versioning}}{{else}}semver{{/if}}"
    - customType: regex
      managerFilePatterns:
        - pkg/machinery/constants/constants.go
      matchStrings:
        - '\/\/\s+renovate: datasource=(?<datasource>.*?)(?:\s+extractVersion=(?<extractVersion>.+?))?(?:\s+versioning=(?<versioning>.+?))?\s+depName=(?<depName>.+?)?\s.*Version\s+=\s+\"(?<currentValue>.+?)\"'
      versioningTemplate: "{{#if versioning}}{{versioning}}{{else}}semver{{/if}}"
    - customType: regex
      managerFilePatterns:
        - internal/integration/k8s/constants.go
        - internal/integration/api/constants.go
      matchStrings:
        - '\/\/\s+renovate: datasource=(?<datasource>.*?)(?:\s+extractVersion=(?<extractVersion>.+?))?(?:\s+versioning=(?<versioning>.+?))?\s+depName=(?<depName>.+?)?(?:\s+registryUrl=(?<registryUrl>.+?))?\s.*Version\s+=\s+\"(?<currentValue>.+?)\"'
      versioningTemplate: "{{#if versioning}}{{versioning}}{{else}}semver{{/if}}"
    - customType: regex
      managerFilePatterns:
        - Dockerfile
      matchStrings:
        - '# syntax = docker\/dockerfile-upstream:(?<currentValue>.*)'
      depNameTemplate: docker/dockerfile-upstream
      datasourceTemplate: docker
      versioningTemplate: docker
  packageRules:
    - enabled: false
      matchFileNames:
        - "website/**"
    - matchPackageNames:
        - golang/go
      versioning: 'regex:^(?<major>\d+)\.(?<minor>\d+)'
