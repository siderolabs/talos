    - name: integration-qemu-csi-longhorn
      buildxOptions:
        enabled: true
      depends:
        - default
      runnerGroup: large
      onWorkflowRun:
        workflows: [artifacts-cron]
        types: [completed]
      triggerLabels:
        - integration/qemu-csi
        - integration/extensions # since iscsi is tested with longhorn v1
        - integration/qemu-csi-longhorn
        - integration/release-gate
      matrix:
        maxParallel: 2
        flatJobMatrix: true
        labelKeys: [csi]
        # v2 (SPDK) is the default-secure path; v1 needs noexec disabled on
        # /var so the instance-manager can exec engine binaries it drops
        # under /var/lib/longhorn/engine-binaries/. The v1 path also tells
        # MountsSuite to skip the /var policy check via
        # -talos.skip-ephemeral-policy.
        include:
          - csi: longhorn
            longhornEngine: v2
            extraWorkerPatch: ""
            extraTestArgs: ""
          - csi: longhorn-v1
            longhornEngine: v1
            extraWorkerPatch: ":@_out/kubelet-fat-patch.yaml:@hack/test/patches/ephemeral-insecure.yaml"
            extraTestArgs: "-talos.skip-ephemeral-policy"
      steps:
        - name: download-artifacts
          artifactStep:
            type: download
            artifactName: talos-artifacts
            artifactPath: _out
        - name: ci-temp-release-tag
        - name: checkout extensions
          checkoutStep:
            repository: siderolabs/extensions
            ref: main
            path: _out/extensions
        - name: set variables
          nonMakeStep: true
          command: cat _out/talos-metadata >> "$GITHUB_ENV"
        - name: build extensions
          command: iscsi-tools util-linux-tools extensions-metadata
          arguments:
            - -C
            - _out/extensions
          environment:
            PLATFORM: linux/amd64
            PUSH: true
            REGISTRY: registry.dev.siderolabs.io
        - name: installer extensions
          command: installer-with-extensions
          environment:
            EXTENSIONS_FILTER_COMMAND: "grep -E '/iscsi-tools|util-linux-tools'"
            IMAGE_REGISTRY: registry.dev.siderolabs.io
        - name: kubelet-fat-patch
        - name: e2e-qemu-csi-longhorn
          command: e2e-qemu
          withSudo: true
          environment:
            GITHUB_STEP_NAME: ${{ github.job}}-e2e-qemu-csi-longhorn-${{ matrix.csi }}
            SHORT_INTEGRATION_TEST: yes
            QEMU_WORKERS: 3
            QEMU_MEMORY_WORKERS: 10240
            QEMU_CPUS_WORKERS: 3
            QEMU_SYSTEM_DISK_SIZE: 20480
            QEMU_EXTRA_DISKS: 1
            QEMU_EXTRA_DISKS_SIZE: 12288
            QEMU_EXTRA_DISKS_DRIVERS: nvme
            WITH_CONFIG_PATCH_CONTROLPLANE: "@hack/test/patches/longhorn-cp.yaml"
            WITH_CONFIG_PATCH_WORKER: "@_out/installer-extensions-patch.yaml:@hack/test/patches/longhorn.yaml${{ matrix.extraWorkerPatch }}"
            EXTRA_TEST_ARGS: -talos.csi=${{ matrix.csi }} ${{ matrix.extraTestArgs }}
            IMAGE_REGISTRY: registry.dev.siderolabs.io
        - name: save-fio-benchmark
          artifactStep:
            type: upload
            artifactName: fio-integration-qemu-csi-longhorn-${{ matrix.csi }}
            disableExecutableListGeneration: true
            artifactPath: /tmp/fio-*.json
            retentionDays: "180"
        - name: save-talos-logs
          conditions:
            - always
          artifactStep:
            type: upload
            artifactName: talos-logs-integration-qemu-csi-longhorn-${{ matrix.csi }}
            disableExecutableListGeneration: true
            artifactPath: /tmp/logs-*.tar.gz
            additionalArtifacts:
              - "/tmp/support-*.zip"
