---
kind: auto.CI
spec:
  compileGHWorkflowsOnly: true
---
kind: common.SOPS
spec:
  enabled: true
  config: |-
    creation_rules:
      - age: age1xrpa9ujxxcj2u2gzfrzv8mxak4rts94a6y60ypurv6rs5cpr4e4sg95f0k
        # order: Andrey, Noel, Artem, Utku, Tim, Andy
        pgp: >-
          15D5721F5F5BAF121495363EFE042E3D4085A811,
          CC51116A94490FA6FB3C18EB2401FCAE863A06CA,
          4919F560F0D35F80CF382D76E084A2DF1143C14D,
          11177A43C6E3752E682AC690DBD13117B0A14E93,
          5D7964FF2DB426ACB3C3505AA2A702DD5B689F45,
          E77ED9F8451E10BD242D07415444881046F92733
---
kind: common.Repository
spec:
  conformScopes:
    - apid
    - machined
    - networkd
    - talosctl
    - trustd
    - talosctl
    - kernel
    - security
    - ci
    - ^v1.14
  licenseChecks:
    - skipPaths:
        - .git/
        - testdata/
      includeSuffixes:
        - .go
      excludeSuffixes:
        - .pb.go
        - .pb.gw.go
        - _string.go
        - _enumer.go
        - _string_linux.go
        - zz_generated.deepcopy.go
      header: |
        // This Source Code Form is subject to the terms of the Mozilla Public
        // License, v. 2.0. If a copy of the MPL was not distributed with this
        // file, You can obtain one at http://mozilla.org/MPL/2.0/.
---
kind: common.GHWorkflow
spec:
  labelDescriptions:
    integration/airgapped: "Run airgapped integration tests"
    integration/aws: "Run AWS integration tests on all architectures"
    integration/aws-amd64: "Run AWS integration tests on AMD64"
    integration/aws-arm64: "Run AWS integration tests on ARM64"
    integration/aws-nvidia: "Run AWS NVIDIA integration tests (all drivers, variants, architectures)"
    integration/aws-nvidia-nonfree: "Run AWS NVIDIA integration tests with non-free drivers"
    integration/aws-nvidia-nonfree-lts-amd64: "Run AWS NVIDIA non-free LTS driver tests on AMD64"
    integration/aws-nvidia-nonfree-lts-arm64: "Run AWS NVIDIA non-free LTS driver tests on ARM64"
    integration/aws-nvidia-nonfree-production-amd64: "Run AWS NVIDIA non-free production driver tests on AMD64"
    integration/aws-nvidia-nonfree-production-arm64: "Run AWS NVIDIA non-free production driver tests on ARM64"
    integration/aws-nvidia-oss: "Run AWS NVIDIA integration tests with OSS drivers"
    integration/aws-nvidia-oss-lts-amd64: "Run AWS NVIDIA OSS LTS driver tests on AMD64"
    integration/aws-nvidia-oss-lts-arm64: "Run AWS NVIDIA OSS LTS driver tests on ARM64"
    integration/aws-nvidia-oss-production-amd64: "Run AWS NVIDIA OSS production driver tests on AMD64"
    integration/aws-nvidia-oss-production-arm64: "Run AWS NVIDIA OSS production driver tests on ARM64"
    integration/cilium: "Run Cilium integration tests"
    integration/cloud-images: "Run cloud images integration tests"
    integration/conformance: "Run Kubernetes conformance tests (all variants)"
    integration/conformance-default: "Run Kubernetes conformance tests on default variant"
    integration/conformance-enforcing: "Run Kubernetes conformance tests on enforcing variant"
    integration/embedded: "Run embedded integration tests"
    integration/extensions: "Run extensions integration tests"
    integration/gcp: "Run GCP integration tests"
    integration/image-cache: "Run image-cache integration tests"
    integration/image-factory: "Run image-factory integration tests"
    integration/images: "Run images integration tests"
    integration/misc: "Run all misc integration tests (misc-0 through misc-4)"
    integration/misc-0: "Run misc-0 integration tests"
    integration/misc-1: "Run misc-1 integration tests"
    integration/misc-2: "Run misc-2 integration tests"
    integration/misc-3: "Run misc-3 integration tests"
    integration/misc-4: "Run misc-4 integration tests"
    integration/provision: "Run provision integration tests (all tracks)"
    integration/qemu: "Run QEMU integration tests (all variants)"
    integration/qemu-csi: "Run QEMU CSI integration tests"
    integration/qemu-csi-openebs: "Run QEMU CSI OpenEBS integration tests"
    integration/qemu-csi-longhorn: "Run QEMU CSI Longhorn integration tests"
    integration/qemu-csi-rook-ceph: "Run QEMU CSI Rook Ceph integration tests"
    integration/qemu-default: "Run QEMU integration tests on default variant"
    integration/qemu-encrypted-vip: "Run QEMU integration tests with disk encryption and virtual IP"
    integration/qemu-enforcing: "Run QEMU integration tests on enforcing variant"
    integration/qemu-ephemeral: "Run QEMU integration tests for a fully ephemeral single-node cluster"
    integration/qemu-race: "Run QEMU integration tests with the race detector"
    integration/release-gate: "Run all release-gate integration tests"
    integration/reproducibility-test: "Run build reproducibility tests"
    integration/trusted-boot: "Run trusted-boot integration tests (all variants)"
    integration/trusted-boot-default: "Run trusted-boot integration tests on default variant"
    integration/trusted-boot-enforcing: "Run trusted-boot integration tests on enforcing variant"
  jobs:
    - name: default
      buildxOptions:
        enabled: true
      runnerGroup: large
      conditions:
        - on-pull-request
      steps:
        - name: ci-temp-release-tag
        - name: external-artifacts
        - name: generate
          command: generate docs
        - name: uki-certs
          environment:
            PLATFORM: linux/amd64
        - name: check-dirty
        - name: build
          command: talosctl kernel sd-boot sd-stub initramfs installer-base imager talos integration-test
          environment:
            PLATFORM: linux/amd64,linux/arm64
            IMAGE_REGISTRY: registry.dev.siderolabs.io
            PUSH: true
        - name: talosctl-cni-bundle
        - name: sbom
        - name: iso
          command: iso secureboot-iso
          environment:
            IMAGER_ARGS: "--extra-kernel-arg=console=ttyS0"
            IMAGE_REGISTRY: registry.dev.siderolabs.io
        - name: images-essential
          environment:
            PLATFORM: linux/amd64,linux/arm64
            IMAGER_ARGS: "--extra-kernel-arg=console=ttyS0"
            IMAGE_REGISTRY: registry.dev.siderolabs.io
        - name: save-artifacts
          artifactStep:
            type: upload
            artifactName: talos-artifacts
            artifactPath: _out
    - name: push
      buildxOptions:
        enabled: true
      runnerGroup: large
      conditions:
        - except-pull-request
        - not-on-tag
      steps:
        - name: build
          command: talosctl-all kernel sd-boot sd-stub initramfs installer-base imager talos
          environment:
            PLATFORM: linux/amd64,linux/arm64
        - name: release-notes
        - name: login-to-registry
          registryLoginStep:
            registry: ghcr.io
        - name: push
          environment:
            PLATFORM: linux/amd64,linux/arm64
        - name: push-latest
          environment:
            PLATFORM: linux/amd64,linux/arm64
          conditions:
            - only-on-main-branch
    - name: tag
      sops: true
      buildxOptions:
        enabled: true
      runnerGroup: large
      conditions:
        - only-on-tag
      steps:
        - name: build
          command: talosctl-all kernel sd-boot sd-stub initramfs installer-base imager talos talosctl-cni-bundle
          environment:
            PLATFORM: linux/amd64,linux/arm64
        - name: release-notes
        - name: sbom
        - name: login-to-registry
          registryLoginStep:
            registry: ghcr.io
        - name: push
          environment:
            PLATFORM: linux/amd64,linux/arm64
        - name: images
          environment:
            PLATFORM: linux/amd64,linux/arm64
        - name: release
          releaseStep:
            baseDirectory: _out
            artifacts:
              - initramfs-amd64.xz
              - initramfs-arm64.xz
              - metal-amd64.iso
              - metal-arm64.iso
              - metal-amd64-uki.efi
              - metal-arm64-uki.efi
              - metal-amd64.raw.zst
              - metal-arm64.raw.zst
              - talos-arm64.spdx.json
              - talos-amd64.spdx.json
              - talos-container-arm64.spdx.json
              - talos-container-amd64.spdx.json
              - talosctl-cni-bundle-amd64.tar.gz
              - talosctl-cni-bundle-arm64.tar.gz
              - talosctl-darwin-amd64
              - talosctl-darwin-arm64
              - talosctl-freebsd-amd64
              - talosctl-freebsd-arm64
              - talosctl-linux-amd64
              - talosctl-linux-arm64
              - talosctl-linux-armv7
              - talosctl-linux-riscv64
              - talosctl-windows-amd64.exe
              - talosctl-windows-arm64.exe
              - vmlinuz-amd64
              - vmlinuz-arm64
            generateChecksums: true
            generateSignatures: true
            releaseNotes: RELEASE_NOTES.md
    - name: cloud-images
      dispatchable: true
      sops: true
      runnerGroup: generic # this is not compute intensive - we are pulling images from factory
      inputs:
        - tag
        - release
      steps:
        - name: cloud-images
          environment:
            CLOUD_IMAGES_EXTRA_ARGS: |-
              --use-factory
            PLATFORM: linux/amd64,linux/arm64
            TAG: ${{ github.event.inputs.tag }}
        - name: attach-images
          nonMakeStep: true
          environment:
            RELEASE: ${{ github.event.inputs.release }}
            GH_TOKEN: ${{ github.token }}
          command: |-
            gh release upload "${RELEASE}" --clobber \
              _out/cloud-images.json
    - name: base-unit-tests
      buildxOptions:
        enabled: true
      depends:
        - default
      runnerGroup: large
      steps:
        - name: download-artifacts
          artifactStep:
            type: download
            artifactName: talos-artifacts
            artifactPath: _out
        - name: ci-temp-release-tag
        - name: unit-tests
        - name: unit-tests-fips
        - name: unit-tests-race
        - name: coverage
          coverageStep:
            files:
              - _out/coverage.txt
          timeoutMinutes: 3
    - name: base-lint
      buildxOptions:
        enabled: true
      depends:
        - default
      runnerGroup: large
      steps:
        - name: download-artifacts
          artifactStep:
            type: download
            artifactName: talos-artifacts
            artifactPath: _out
        - name: ci-temp-release-tag
        - name: lint
    - name: release-metadata-check
      runnerGroup: generic
      conditions:
        - on-pull-request
      steps:
        - name: release-metadata-check
          environment:
            GH_TOKEN: ${{ github.token }}
            PR_TITLE: ${{ github.event.pull_request.title }}
    - name: grype-scan
      buildxOptions:
        enabled: true
      depends:
        - default
      runnerGroup: large
      crons:
        - '30 7 * * *'
      steps:
        - name: login-to-registry
          registryLoginStep:
            registry: ghcr.io
        - name: local-grype-scan-result
          environment:
            DEST: _out
        # Fail the run if found vulnerabilities which do not have a statement
        - name: target-grype-validate
        - name: save-scan-result
          conditions:
            - always
          artifactStep:
            type: upload
            artifactName: talos-grype-scan-result
            disableExecutableListGeneration: true
            artifactPath: _out/grype-scan.log
    - name: e2e-iso
      depends:
        - default
      runnerGroup: large
      steps:
        - name: download-artifacts
          artifactStep:
            type: download
            artifactName: talos-artifacts
            artifactPath: _out
        - name: ci-temp-release-tag
        - name: e2e-iso
          withSudo: true
          environment:
            IMAGE_REGISTRY: registry.dev.siderolabs.io
        - name: save-talos-logs
          conditions:
            - always
          artifactStep:
            type: upload
            artifactName: talos-logs-e2e-iso
            disableExecutableListGeneration: true
            artifactPath: /tmp/logs-*.tar.gz
            additionalArtifacts:
              - "/tmp/support-*.zip"
    - name: e2e-qemu-short
      depends:
        - default
      runnerGroup: large
      steps:
        - name: download-artifacts
          artifactStep:
            type: download
            artifactName: talos-artifacts
            artifactPath: _out
        - name: ci-temp-release-tag
        - name: e2e-qemu
          withSudo: true
          environment:
            GITHUB_STEP_NAME: ${{ github.job}}-e2e-qemu-short
            IMAGE_REGISTRY: registry.dev.siderolabs.io
            WITH_CONFIG_PATCH: "@hack/test/patches/image-verification.yaml"
            SHORT_INTEGRATION_TEST: yes
        - name: save-talos-logs
          conditions:
            - always
          artifactStep:
            type: upload
            artifactName: talos-logs-e2e-qemu-short
            disableExecutableListGeneration: true
            artifactPath: /tmp/logs-*.tar.gz
            additionalArtifacts:
              - "/tmp/support-*.zip"
    - name: e2e-docker-short
      depends:
        - default
      runnerGroup: large
      steps:
        - name: download-artifacts
          artifactStep:
            type: download
            artifactName: talos-artifacts
            artifactPath: _out
        - name: ci-temp-release-tag
        - name: e2e-docker
          withSudo: false
          environment:
            IMAGE_REGISTRY: registry.dev.siderolabs.io
            SHORT_INTEGRATION_TEST: yes
        - name: save-talos-logs
          conditions:
            - always
          artifactStep:
            type: upload
            artifactName: talos-logs-e2e-docker-short
            disableExecutableListGeneration: true
            artifactPath: /tmp/logs-*.tar.gz
            additionalArtifacts:
              - "/tmp/support-*.zip"
    - name: artifacts
      buildxOptions:
        enabled: true
      runnerGroup: large
      crons:
        - '30 3 * * *'
      cronOnly: true
      steps:
        - name: external-artifacts
        - name: generate
        - name: uki-certs
          environment:
            PLATFORM: linux/amd64
        - name: build
          command: talosctl kernel sd-boot sd-stub initramfs installer-base imager talos integration-test
          environment:
            PLATFORM: linux/amd64,linux/arm64
            IMAGE_REGISTRY: registry.dev.siderolabs.io
            PUSH: true
        - name: talosctl-cni-bundle
        - name: iso
          command: iso secureboot-iso
          environment:
            PLATFORM: linux/amd64,linux/arm64
            IMAGER_ARGS: "--extra-kernel-arg=console=ttyS0"
            IMAGE_REGISTRY: registry.dev.siderolabs.io
        - name: images-essential
          environment:
            PLATFORM: linux/amd64,linux/arm64
            IMAGER_ARGS: "--extra-kernel-arg=console=ttyS0"
            IMAGE_REGISTRY: registry.dev.siderolabs.io
        - name: save-artifacts
          artifactStep:
            type: upload
            artifactName: talos-artifacts
            artifactPath: _out
            retentionDays: 1
    - name: integration-qemu
      buildxOptions:
        enabled: true
      depends:
        - default
        - integration-build-enforcing
      runnerGroup: large
      onWorkflowRun:
        workflows: [integration-build-enforcing-triggered]
        types: [completed]
      triggerLabels:
        - integration/qemu
        - integration/release-gate
      matrix:
        maxParallel: 2
        labelKeys: [variant]
        include:
          - variant: default
            withUserDisk: "true"
            userDisksMounts: "/var/mnt/extra,/var/mnt/p1,/var/mnt/p2"
            withConfigPatch: "@hack/test/patches/image-verification.yaml"
            withConfigPatchWorker: "@hack/test/patches/ephemeral-nvme.yaml:@hack/test/patches/dm-raid-module.yaml"
            qemuExtraDisks: "4"
            qemuExtraDisksDrivers: "virtiofs,ide,nvme"
            qemuExtraDiscsTags: "disk0"
          - variant: enforcing
            tagSuffixIn: -enforcing
            extraTestArgs: -talos.enforcing
            withEnforcing: "true"
            withUserDisk: "true"
            userDisksMounts: "/var/mnt/extra,/var/mnt/p1,/var/mnt/p2"
            withConfigPatch: "@hack/test/patches/image-verification.yaml"
            withConfigPatchWorker: "@hack/test/patches/ephemeral-nvme.yaml:@hack/test/patches/dm-raid-module.yaml"
            qemuExtraDisks: "3"
            qemuExtraDisksDrivers: "ide,nvme"
          - variant: encrypted-vip
            withDiskEncryption: "true"
            withVirtualIp: "true"
            withKubespan: "true"
            withConfigPatch: "@hack/test/patches/image-verification.yaml"
            withConfigPatchWorker: "@hack/test/patches/ephemeral-nvme.yaml:@hack/test/patches/dm-raid-module.yaml"
            qemuExtraDisks: "4"
            qemuExtraDisksDrivers: "virtiofs,ide,nvme"
            qemuExtraDiscsTags: "disk0"
          - variant: race
            buildRace: "true"
            tagSuffix: -race
            extraTestArgs: "-talos.race"
            withConfigPatchWorker: "@hack/test/patches/ephemeral-nvme.yaml:@hack/test/patches/dm-raid-module.yaml"
            qemuExtraDisks: "4"
            qemuExtraDisksDrivers: "virtiofs,ide,nvme"
            qemuExtraDiscsTags: "disk0"
            qemuMemoryControlplanes: "4096"
            qemuMemoryWorkers: "4096"
      steps:
        - name: download-artifacts
          artifactStep:
            type: download
            artifactName: talos-enforcing-artifacts
            artifactPath: _out
        - name: ci-temp-release-tag
        - name: build-race
          command: initramfs installer-base imager installer
          conditions:
            - matrix.buildRace
          environment:
            PUSH: true
            TAG_SUFFIX: ${{ matrix.tagSuffix }}
            WITH_RACE: "1"
            PLATFORM: linux/amd64
            IMAGE_REGISTRY: registry.dev.siderolabs.io
        - name: e2e-qemu
          withSudo: true
          environment:
            IMAGE_REGISTRY: registry.dev.siderolabs.io
            TAG_SUFFIX_IN: ${{ matrix.tagSuffixIn }}
            TAG_SUFFIX: ${{ matrix.tagSuffix }}
            EXTRA_TEST_ARGS: ${{ matrix.extraTestArgs }}
            WITH_ENFORCING: ${{ matrix.withEnforcing }}
            WITH_DISK_ENCRYPTION: ${{ matrix.withDiskEncryption }}
            WITH_VIRTUAL_IP: ${{ matrix.withVirtualIp }}
            WITH_KUBESPAN: ${{ matrix.withKubespan }}
            WITH_USER_DISK: ${{ matrix.withUserDisk }}
            USER_DISKS_MOUNTS: ${{ matrix.userDisksMounts }}
            WITH_CONFIG_PATCH: ${{ matrix.withConfigPatch }}
            WITH_CONFIG_PATCH_WORKER: ${{ matrix.withConfigPatchWorker }}
            QEMU_EXTRA_DISKS: ${{ matrix.qemuExtraDisks }}
            QEMU_EXTRA_DISKS_SIZE: "10240"
            QEMU_EXTRA_DISKS_DRIVERS: ${{ matrix.qemuExtraDisksDrivers }}
            QEMU_EXTRA_DISKS_TAGS: ${{ matrix.qemuExtraDiscsTags }}
            QEMU_MEMORY_CONTROLPLANES: ${{ matrix.qemuMemoryControlplanes }}
            QEMU_MEMORY_WORKERS: ${{ matrix.qemuMemoryWorkers }}
        - name: save-talos-logs
          conditions:
            - always
          artifactStep:
            type: upload
            artifactName: talos-logs-integration-qemu-${{ matrix.variant }}
            disableExecutableListGeneration: true
            artifactPath: /tmp/logs-*.tar.gz
            additionalArtifacts:
              - "/tmp/support-*.zip"
    - name: integration-qemu-ephemeral
      buildxOptions:
        enabled: true
      depends:
        - default
      runnerGroup: large
      onWorkflowRun:
        workflows: [default]
        types: [completed]
      triggerLabels:
        - integration/qemu-ephemeral
        - integration/release-gate
      steps:
        - name: download-artifacts
          artifactStep:
            type: download
            artifactName: talos-artifacts
            artifactPath: _out
        - name: ci-temp-release-tag
        - name: e2e-qemu
          withSudo: true
          environment:
            IMAGE_REGISTRY: registry.dev.siderolabs.io
            WITH_EPHEMERAL_NODE: "true"
            QEMU_MEMORY_CONTROLPLANES: "6144"
        - name: save-talos-logs
          conditions:
            - always
          artifactStep:
            type: upload
            artifactName: talos-logs-integration-qemu-ephemeral
            disableExecutableListGeneration: true
            artifactPath: /tmp/logs-*.tar.gz
            additionalArtifacts:
              - "/tmp/support-*.zip"
    - name: integration-embedded
      buildxOptions:
        enabled: true
      depends:
        - default
      runnerGroup: large
      onWorkflowRun:
        workflows: [artifacts-cron]
        types: [completed]
      triggerLabels:
        - integration/embedded
        - integration/release-gate
      steps:
        - name: download-artifacts
          artifactStep:
            type: download
            artifactName: talos-artifacts
            artifactPath: _out
        - name: ci-temp-release-tag
        - name: e2e-embedded
          withSudo: true
          environment:
            IMAGE_REGISTRY: registry.dev.siderolabs.io
        - name: save-talos-logs
          conditions:
            - always
          artifactStep:
            type: upload
            artifactName: talos-logs-integration-embedded
            disableExecutableListGeneration: true
            artifactPath: /tmp/logs-*.tar.gz
            additionalArtifacts:
              - "/tmp/support-*.zip"
    - name: integration-conformance
      buildxOptions:
        enabled: true
      depends:
        - default
        - integration-build-enforcing
      runnerGroup: large
      triggerLabels:
        - integration/conformance
        - integration/release-gate
      onWorkflowRun:
        workflows: [integration-build-enforcing-triggered]
        types: [completed]
      matrix:
        maxParallel: 2
        labelKeys: [variant]
        include:
          - variant: default
            withConfigPatch: "@hack/test/patches/image-verification.yaml"
          - variant: enforcing
            withConfigPatch: "@hack/test/patches/image-verification.yaml"
            tagSuffixIn: -enforcing
            withEnforcing: "true"
            extraTestArgs: -talos.enforcing
      steps:
        - name: download-artifacts
          artifactStep:
            type: download
            artifactName: talos-enforcing-artifacts
            artifactPath: _out
        - name: ci-temp-release-tag
        - name: conformance-qemu
          command: e2e-qemu
          withSudo: true
          environment:
            GITHUB_STEP_NAME: ${{ github.job}}-conformance-qemu
            QEMU_CPUS_WORKERS: 6
            QEMU_MEMORY_WORKERS: 4096
            TEST_MODE: fast-conformance
            WITH_CONFIG_PATCH: ${{ matrix.withConfigPatch }}
            TAG_SUFFIX_IN: ${{ matrix.tagSuffixIn }}
            WITH_ENFORCING: ${{ matrix.withEnforcing }}
            EXTRA_TEST_ARGS: ${{ matrix.extraTestArgs }}
            IMAGE_REGISTRY: registry.dev.siderolabs.io
        - name: save-talos-logs
          conditions:
            - always
          artifactStep:
            type: upload
            artifactName: talos-logs-integration-conformance-${{ matrix.variant }}
            disableExecutableListGeneration: true
            artifactPath: /tmp/logs-*.tar.gz
            additionalArtifacts:
              - "/tmp/support-*.zip"
    - name: integration-trusted-boot
      buildxOptions:
        enabled: true
      depends:
        - default
        - integration-build-enforcing
      runnerGroup: large
      onWorkflowRun:
        workflows: [integration-build-enforcing-triggered]
        types: [completed]
      triggerLabels:
        - integration/trusted-boot
        - integration/release-gate
      matrix:
        maxParallel: 3
        labelKeys: [variant]
        include:
          - variant: default
            withConfigPatch: "@hack/test/patches/image-verification.yaml"
            withTrustedBootISO: "true"
            extraTestArgs: "-talos.trustedboot"
          - variant: disk-image
            withConfigPatch: "@hack/test/patches/image-verification.yaml"
            extraTestArgs: "-talos.trustedboot"
            withTrustedBootDiskImage: "true"
          - variant: enforcing
            withConfigPatch: "@hack/test/patches/image-verification.yaml"
            tagSuffixIn: -enforcing
            withTrustedBootISO: "true"
            withEnforcing: "true"
            extraTestArgs: "-talos.trustedboot -talos.enforcing"
      steps:
        - name: download-artifacts
          artifactStep:
            type: download
            artifactName: talos-enforcing-artifacts
            artifactPath: _out
        - name: ci-temp-release-tag
        - name: secureboot-iso
          conditions:
            - matrix.withEnforcing
          environment:
            PLATFORM: linux/amd64,linux/arm64
            IMAGER_ARGS: "--extra-kernel-arg=console=ttyS0 --extra-kernel-arg=enforcing=1"
            IMAGE_REGISTRY: registry.dev.siderolabs.io
        - name: image-secureboot-metal
          conditions:
            - matrix.withTrustedBootDiskImage
          environment:
            PLATFORM: linux/amd64,linux/arm64
            IMAGER_ARGS: "--extra-kernel-arg=console=ttyS0"
            IMAGE_REGISTRY: registry.dev.siderolabs.io
        - name: integration-trusted-boot
          command: e2e-qemu
          withSudo: true
          environment:
            GITHUB_STEP_NAME: ${{ github.job}}-integration-trusted-boot-${{ matrix.variant }}
            VIA_MAINTENANCE_MODE: true
