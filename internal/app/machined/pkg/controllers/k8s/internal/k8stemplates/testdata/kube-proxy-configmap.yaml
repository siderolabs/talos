apiVersion: v1
data:
  config.conf: |
    apiVersion: kubeproxy.config.k8s.io/v1alpha1
    clientConnection:
      kubeconfig: /etc/kubernetes/kubeconfig
    clusterCIDR: 10.244.0.0/16
    conntrack:
      maxPerCore: 0
    kind: KubeProxyConfiguration
    mode: nftables
kind: ConfigMap
metadata:
  labels:
    k8s-app: kube-proxy
    tier: node
  name: kube-proxy-config-abc123
  namespace: kube-system
