apiVersion: v1
kind: Pod
metadata:
  annotations:
    talos.dev/config-file-version: "222"
    talos.dev/config-version: undefined
    talos.dev/secrets-version: "111"
  labels:
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/managed-by: Talos
    app.kubernetes.io/name: kube-apiserver
    app.kubernetes.io/version: 1.36.0
    component: kube-apiserver
    k8s-app: kube-apiserver
    tier: control-plane
  name: kube-apiserver
  namespace: kube-system
spec:
  containers:
  - command:
    - /usr/local/bin/kube-apiserver
    - --etcd-servers=https://127.0.0.1:2379
    - --secure-port=6443
    env:
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    image: registry.k8s.io/kube-apiserver:v1.36.0
    name: kube-apiserver
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        add:
        - NET_BIND_SERVICE
        drop:
        - ALL
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault
    volumeMounts:
    - mountPath: /system/secrets/kubernetes/kube-apiserver
      name: secrets
      readOnly: true
    - mountPath: /system/config/kubernetes/kube-apiserver
      name: config
      readOnly: true
    - mountPath: /var/log/audit/kube
      name: audit
    - mountPath: /tmp
      name: tmp
    - mountPath: /var/run/kubernetes
      name: run
  hostNetwork: true
  priority: 2000000000
  priorityClassName: system-cluster-critical
  securityContext:
    runAsGroup: 65534
    runAsNonRoot: true
    runAsUser: 65534
  volumes:
  - hostPath:
      path: /system/secrets/kubernetes/kube-apiserver
    name: secrets
  - hostPath:
      path: /system/config/kubernetes/kube-apiserver
    name: config
  - hostPath:
      path: /var/log/audit/kube
    name: audit
  - emptyDir:
      medium: Memory
    name: tmp
  - emptyDir:
      medium: Memory
    name: run
status: {}
