addresses:
    - address: 192.168.1.92/24
      linkName: eth0
      family: inet4
      scope: global
      flags: permanent
      layer: platform
    - address: 192.168.1.100/24
      linkName: eth0
      family: inet4
      scope: global
      flags: permanent
      layer: platform
links:
    - name: eth0
      logical: false
      up: true
      mtu: 0
      kind: ""
      type: ether
      layer: platform
routes:
    - family: inet4
      dst: ""
      src: ""
      gateway: 192.168.1.1
      outLinkName: eth0
      table: main
      priority: 100
      scope: global
      type: unicast
      flags: ""
      protocol: static
      layer: platform
    - family: inet4
      dst: 10.0.0.0/8
      src: ""
      gateway: 192.168.1.1
      outLinkName: eth0
      table: main
      priority: 1024
      scope: global
      type: unicast
      flags: ""
      protocol: static
      layer: platform
    - family: inet4
      dst: 172.16.0.0/16
      src: ""
      gateway: 192.168.1.1
      outLinkName: eth0
      table: main
      priority: 500
      scope: global
      type: unicast
      flags: ""
      protocol: static
      layer: platform
hostnames:
    - hostname: code-server
      domainname: ""
      layer: platform
resolvers:
    - dnsServers:
        - 9.9.9.9
        - 192.168.1.1
        - 8.8.8.8
        - 1.1.1.1
      nameServers:
        - addr: 9.9.9.9
          protocol: Do53
          tlsServerName: ""
        - addr: 192.168.1.1
          protocol: Do53
          tlsServerName: ""
        - addr: 8.8.8.8
          protocol: Do53
          tlsServerName: ""
        - addr: 1.1.1.1
          protocol: Do53
          tlsServerName: ""
      layer: platform
      searchDomains:
        - global.example.com
        - example.com
timeServers: []
operators:
    - operator: dhcp4
      linkName: eth1
      requireUp: true
      dhcp4:
        routeMetric: 200
        skipHostnameRequest: true
      layer: platform
    - operator: dhcp6
      linkName: eth1
      requireUp: true
      dhcp6:
        routeMetric: 200
        skipHostnameRequest: true
      layer: platform
externalIPs: []
metadata:
    platform: opennebula
    hostname: code-server
    instanceId: "14"
