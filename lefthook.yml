pre-commit:
  jobs:
    - name: fix
      group:
        parallel: false
        jobs:
          - name: generate
            run: make generate
            env:
              USERNAME: siderolabs
            stage_fixed: true
          - name: docs
            run: make docs
            env:
              USERNAME: siderolabs
            stage_fixed: true
          - name: fmt
            run: make fmt
            env:
              USERNAME: siderolabs
            stage_fixed: true
          - name: lint-fmt
            run: make lint-fmt
            env:
              USERNAME: siderolabs
            stage_fixed: true
    - name: lint
      group:
        parallel: false
        jobs:
          - name: lint
            run: make lint
            env:
              USERNAME: siderolabs
post-commit:
  parallel: false
  commands:
    conformance:
      run: make conformance
      env:
        USERNAME: siderolabs
