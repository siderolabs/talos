issues:
  max-issues-per-linter: 1024
  max-same-issues: 1024
  uniq-by-line: true
  new: false
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/siderolabs/talos)
  exclusions:
    generated: lax
    paths:
      - .*\\.pb\\.go$
      - third_party$
      - builtin$
      - examples$
